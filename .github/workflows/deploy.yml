name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy dist/ to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          rm -rf assets index.html favicon.svg
          cp -rf dist/assets assets
          cp -f dist/index.html index.html
          cp -f dist/favicon.svg favicon.svg
          git add assets/ index.html favicon.svg
          git diff --cached --quiet && echo "No changes to deploy" || \
            git commit -m "Deploy: update built assets [skip ci]" && \
            git push origin gh-pages
