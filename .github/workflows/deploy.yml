name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy built files to main root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -f dist/index.html index.html
          cp -f dist/favicon.svg favicon.svg
          cp -rf dist/assets assets
          git add index.html favicon.svg assets/
          git diff --cached --quiet && echo "No changes" || git commit -m "Deploy: update built assets [skip ci]"
          git push
