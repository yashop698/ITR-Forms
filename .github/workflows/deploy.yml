name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'favicon.svg'
      - 'assets/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy built files to main root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -f dist/index.html index.html
          cp -f dist/favicon.svg favicon.svg
          rm -rf assets
          cp -rf dist/assets assets
          git add index.html favicon.svg assets/
          git diff --cached --quiet && echo "No changes to deploy" || \
            git commit -m "Deploy: update built assets [skip ci]" && \
            git push origin main
